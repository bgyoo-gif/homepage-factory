<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Section 02 Preview — Definition</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&family=Fragment+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background: #f2f2f2; }
    .s2-section { width: 100%; padding: 80px 0; background-color: #ffffff; font-family: "DM Sans", sans-serif; color: #0f0f0f; -webkit-font-smoothing: antialiased; word-break: keep-all; overflow-wrap: break-word; }
    .s2-container { width: 100%; margin: 0 auto; padding: 0 16px; box-sizing: border-box; }
    .s2-header { margin-bottom: 32px; text-align: center; padding-bottom: 24px; border-bottom: 1px solid #e6e7e9; }
    .s2-header__title { font-size: 24px; font-weight: 700; color: #0f0f0f; line-height: 1.2; letter-spacing: -0.5px; text-wrap: balance; }
    .s2-header__title-brand { color: #725bea; }
    .s2-banner { padding: 24px 32px; border-top: 1px solid #e6e7e9; border-bottom: 1px solid #e6e7e9; background-color: #f7f7f7; font-size: 16px; line-height: 1.7; text-align: center; color: #0f0f0f; text-wrap: pretty; }
    .s2-banner strong { font-weight: 600; color: #0f0f0f; }
    @media (min-width: 768px) { .s2-container { padding: 0 32px; } .s2-header__title { font-size: 28px; } }
    @media (min-width: 1024px) { .s2-container { padding: 0 32px; } .s2-header__title { font-size: 32px; } }
    @media (min-width: 1440px) { .s2-container { padding: 0 120px; max-width: 1440px; } .s2-header__title { font-size: 36px; } }
  </style>
</head>
<body>
  <section class="s2-section">
    <div class="s2-container">
      <div class="s2-header">
        <h2 class="s2-header__title"><span class="s2-header__title-brand">Definition</span></h2>
      </div>
      <div class="s2-banner">
        <strong>Execution State Layer (ESL)</strong> is a data infrastructure layer that binds every AI execution to a versioned, frozen, and verifiable data state, enabling reproducibility, traceability, and consistent outcomes across production environments.
      </div>
    </div>
  </section>
</body>
</html>
