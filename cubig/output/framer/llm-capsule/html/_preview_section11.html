    .s11-eyebrow {

    .s11-section-title {

      line-height: 1.2;
      letter-spacing: -1px;
    }
    .s11-title-brand {
      background: linear-gradient(130deg, #6C54A0, #b44fcc 50%, #ff266a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .s11-marquee-wrap {
      width: 100%;
      overflow: hidden;
      mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
    }
    @keyframes s11-marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .s11-marquee-track {
      display: flex;
      align-items: center;
      width: max-content;
      animation: s11-marquee 30s linear infinite;
    }
    .s11-marquee-track:hover { animation-play-state: paused; }
    .s11-partner-item {
      display: flex;

      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 28px;

    }
    .s11-partner-logo {

      width: auto;
      max-width: 100px;
      object-fit: contain;
      filter: grayscale(1) opacity(0.55);
      transition: filter 0.2s;
    }
    .s11-partner-item:hover .s11-partner-logo { filter: grayscale(0) opacity(1); }
    .s11-partner-name {
      font-size: 11px;
      font-weight: 500;
      color: #9c9c9c;
      text-align: center;
      white-space: nowrap;
