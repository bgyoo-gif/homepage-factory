<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Section 09 — Where CUBIG Fits Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&family=Fragment+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f0f0; }

    .s9esd-section {
      width: 100%; padding: 80px 0; background-color: #ffffff;
      font-family: "DM Sans", sans-serif; color: #0f0f0f;
      -webkit-font-smoothing: antialiased; word-break: keep-all; overflow-wrap: break-word;
    }
    .s9esd-container { width: 100%; padding: 0 16px; box-sizing: border-box; margin: 0 auto; }
    .s9esd-banner-full {
      width: 100%; text-align: center; padding: 32px 48px; border-radius: 40px;
      background-image: url('../../reference/images/bg-paint-lavender-gold.webp');
      background-size: cover; background-position: center; position: relative;
      overflow: hidden; isolation: isolate; font-size: 18px; font-weight: 500;
      line-height: 1.7; border: none; word-break: keep-all; overflow-wrap: break-word;
    }
    .s9esd-banner-full::before {
      content: ''; position: absolute; inset: 0;
      background: rgba(255, 255, 255, 0.82); z-index: 0;
    }
    .s9esd-banner-full > * { position: relative; z-index: 1; }
    .s9esd-banner-body {
      font-size: 16px; color: #0f0f0f; line-height: 1.7; max-width: 100%;
      margin: 0 auto; text-wrap: pretty; word-break: keep-all; overflow-wrap: break-word;
    }
    .s9esd-banner-body strong { font-weight: 600; color: #0f0f0f; }
    .s9esd-cta-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      border-radius: 9999px; font-family: "DM Sans", sans-serif; font-weight: 500;
      font-size: 14px; cursor: pointer; border: 1px solid #e6e7e9;
      transition: opacity 0.2s, background-color 0.2s; white-space: nowrap;
      text-decoration: none; padding: 8px 16px; background-color: transparent;
      color: #0f0f0f; margin-top: 12px; display: block;
    }
    .s9esd-cta-btn:hover { background-color: #f7f7f7; }
    @media (min-width: 768px) { .s9esd-container { padding: 0 32px; } }
    @media (min-width: 1024px) { .s9esd-container { padding: 0 32px; } .s9esd-banner-body { max-width: 720px; } }
    @media (min-width: 1440px) { .s9esd-container { padding: 0 120px; max-width: 1440px; } .s9esd-banner-body { max-width: 860px; } }
  </style>
</head>
<body>
  <section class="s9esd-section">
    <div class="s9esd-container">
      <div class="s9esd-banner-full" role="complementary" aria-label="Where CUBIG fits">
        <p class="s9esd-banner-body">
          Databricks and Snowflake store your data. MLflow tracks your models. <strong>CUBIG is the layer between them and your AI</strong> — making data usable, reproducible, and blocker-free in production.
          <a href="/" class="s9esd-cta-btn">See how →</a>
        </p>
      </div>
    </div>
  </section>
</body>
</html>
