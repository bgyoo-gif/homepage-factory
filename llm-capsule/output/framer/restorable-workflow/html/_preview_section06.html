<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Section06 CTA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; }

    .s6-section {
      width: 100%;
      position: relative;
      overflow: hidden;
      padding: 80px 16px;
      text-align: center;
      background-color: #171719;
      background-image: url('https://bgyoo-gif.github.io/homepage-factory/cubig/reference/images/bg-paint-blue-iridescent.png');
      background-size: cover;
      background-position: center;
    }
    .s6-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.15);
      z-index: 0;
    }
    .s6-section > * { position: relative; z-index: 1; }
    .s6-inner {
      max-width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .s6-title {
      font-family: "DM Sans", sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin: 0;
      text-wrap: pretty;
    }
    .s6-product-name { font-family: "Oxanium", sans-serif; font-weight: 700; }
    .s6-description {
      font-family: "DM Sans", sans-serif;
      font-size: 18px;
      color: rgba(255,255,255,0.85);
      line-height: 1.7;
      margin: 0;
      word-break: keep-all;
      overflow-wrap: break-word;
      text-wrap: pretty;
    }
    .s6-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      flex-direction: column;
      align-items: center;
    }
    .s6-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 9999px;
      font-family: "DM Sans", sans-serif;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.6);
      transition: background-color 0.2s;
      white-space: nowrap;
      text-decoration: none;
      padding: 16px 48px;
      font-size: 18px;
      background-color: rgba(255,255,255,0.92);
      color: #0f0f0f;
      backdrop-filter: blur(8px);
      width: 100%;
      max-width: 320px;
    }
    .s6-btn:hover { background-color: #ffffff; }
    .s6-footnote {
      font-family: "DM Sans", sans-serif;
      font-size: 12px;
      color: rgba(255,255,255,0.70);
      margin-top: 8px;
    }

    @media (min-width: 768px) {
      .s6-actions { flex-direction: row; }
      .s6-btn { width: auto; max-width: none; }
      .s6-title { font-size: 40px; }
      .s6-section { padding: 100px 32px; }
    }
    @media (min-width: 1024px) { .s6-inner { max-width: 720px; } }
    @media (min-width: 1440px) {
      .s6-inner { max-width: 1080px; }
      .s6-title { font-size: 50px; }
      .s6-section { padding: 120px 120px; }
    }
    @media (max-width: 767px) {
      .s6-section { background-image: none; }
    }
  </style>
</head>
<body>
  <section class="s6-section" id="section-cta">
    <div class="s6-inner">
      <h2 class="s6-title">
        See <span class="s6-product-name">LLM Capsule</span> Restorable Workflow in Action
      </h2>
      <p class="s6-description">Experience how enterprise AI outputs are automatically restored with real business data — no manual post-processing required.</p>
      <div class="s6-actions">
        <a href="/request-a-demo" class="s6-btn">Request a Demo</a>
        <a href="/product" class="s6-btn">View Product</a>
      </div>
      <p class="s6-footnote">Enterprise AI Enablement by CUBIG</p>
    </div>
  </section>
</body>
</html>
