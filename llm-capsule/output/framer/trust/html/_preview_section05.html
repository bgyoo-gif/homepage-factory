<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Section 05 Regulatory Support</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&family=Fragment+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background-color: #ffffff; word-break: keep-all; overflow-wrap: break-word; -webkit-font-smoothing: antialiased; }
    img, video { max-width: 100%; display: block; }
    a { text-decoration: none; color: inherit; }

    .s5-section { width: 100%; overflow: hidden; padding: 60px 0; background-color: #ffffff; }
    .s5-container { width: 100%; padding: 0 16px; max-width: 100%; margin: 0 auto; }
    @media (min-width: 768px)  { .s5-container { padding: 0 32px; } }
    @media (min-width: 1440px) { .s5-container { padding: 0 120px; max-width: 1440px; } }

    .s5-banner {
      padding: 16px 24px;
      border-top: 1px solid #e6e7e9;
      border-bottom: 1px solid #e6e7e9;
      background-color: rgba(21, 94, 160, 0.06);
      font-size: 14px;
      line-height: 1.7;
      text-align: center;
      word-break: keep-all;
      overflow-wrap: break-word;
      color: #0f0f0f;
    }
    .s5-product { font-family: "Oxanium", sans-serif; font-weight: 700; }

    .s5-spaced-top { margin-top: 24px; }
    .s5-bullet { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
    .s5-bullet__item { display: flex; align-items: flex-start; gap: 8px; font-size: 16px; line-height: 1.5; color: #0f0f0f; }
    .s5-bullet__icon { width: 20px; height: 20px; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; color: #0e824c; font-weight: 700; font-size: 16px; line-height: 1; }
  </style>
</head>
<body>
  <section class="s5-section">
    <div class="s5-container">
      <div class="s5-banner">
        <p><span class="s5-product">LLM Capsule</span> supports enterprise compliance by ensuring sensitive data never leaves the enterprise environment during AI processing. Organizations should evaluate specific compliance requirements with their legal counsel.</p>
      </div>

      <ul class="s5-bullet s5-spaced-top" role="list" aria-label="Supported compliance frameworks">
        <li class="s5-bullet__item">
          <span class="s5-bullet__icon" aria-hidden="true">&#10003;</span>
          <span>GDPR</span>
        </li>
        <li class="s5-bullet__item">
          <span class="s5-bullet__icon" aria-hidden="true">&#10003;</span>
          <span>HIPAA</span>
        </li>
        <li class="s5-bullet__item">
          <span class="s5-bullet__icon" aria-hidden="true">&#10003;</span>
          <span>SOX</span>
        </li>
        <li class="s5-bullet__item">
          <span class="s5-bullet__icon" aria-hidden="true">&#10003;</span>
          <span>Sector-specific data regulations</span>
        </li>
      </ul>
    </div>
  </section>
</body>
</html>
