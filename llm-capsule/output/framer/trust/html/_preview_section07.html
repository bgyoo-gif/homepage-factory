<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Section 07 CTA Band</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&family=Fragment+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background-color: #ffffff; word-break: keep-all; overflow-wrap: break-word; -webkit-font-smoothing: antialiased; }
    img, video { max-width: 100%; display: block; }
    a { text-decoration: none; color: inherit; }

    .s7-cta-band {
      width: 100%;
      overflow: hidden;
      position: relative;
      padding: 80px 16px;
      text-align: center;
      background: linear-gradient(130deg, #1821E8 0%, #5690D4 50%, #55B45D 100%);
    }
    @media (min-width: 768px)  { .s7-cta-band { padding: 100px 32px; } .s7-title { font-size: 40px !important; } }
    @media (min-width: 1440px) { .s7-cta-band { padding: 120px 120px; } .s7-title { font-size: 50px !important; } }
    @media (max-width: 767px) { .s7-cta-band { background-image: none; } .s7-actions { flex-direction: column; align-items: center; } .s7-actions .s7-btn { width: 100%; max-width: 320px; } }

    .s7-cta-band::before { content: ''; position: absolute; inset: 0; background-color: rgba(0,0,0,0.15); z-index: 0; }
    .s7-cta-band > * { position: relative; z-index: 1; }

    .s7-band-inner { max-width: 100%; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 24px; }
    @media (min-width: 1024px) { .s7-band-inner { max-width: 720px; } }
    @media (min-width: 1440px) { .s7-band-inner { max-width: 1080px; } }

    .s7-title { font-size: 36px; font-weight: 700; color: #ffffff; line-height: 1.2; letter-spacing: -0.5px; margin: 0; text-wrap: balance; }
    .s7-product { font-family: "Oxanium", sans-serif; font-weight: 700; }
    .s7-description { font-size: 18px; color: rgba(255,255,255,0.85); line-height: 1.7; margin: 0; word-break: keep-all; overflow-wrap: break-word; text-wrap: pretty; }
    .s7-actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; }
    .s7-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      border-radius: 9999px; font-weight: 500; cursor: pointer;
      transition: opacity 0.2s, background-color 0.2s; white-space: nowrap;
      text-decoration: none; padding: 12px 32px; font-size: 16px;
      background-color: rgba(255,255,255,0.92); color: #0f0f0f;
      border: 1px solid rgba(255,255,255,0.6); backdrop-filter: blur(8px);
    }
    .s7-btn:hover { background-color: #ffffff; }
    .s7-footnote { font-size: 12px; color: rgba(255,255,255,0.70); display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; align-items: center; }
    .s7-footnote a { color: rgba(255,255,255,0.85); text-decoration: none; transition: color 0.2s; }
    .s7-footnote a:hover { color: #ffffff; }
    .s7-footnote span { color: rgba(255,255,255,0.55); }
  </style>
</head>
<body>
  <div class="s7-cta-band">
    <div class="s7-band-inner">
      <h2 class="s7-title">See how <span class="s7-product">LLM Capsule</span> works with your data</h2>
      <p class="s7-description">Bring your documents, deployment constraints, and evaluation criteria. We demonstrate on your actual workflows.</p>
      <div class="s7-actions">
        <a href="/request-a-demo" class="s7-btn">Request a Demo</a>
        <a href="/architecture" class="s7-btn">Talk to an Architect</a>
      </div>
      <div class="s7-footnote">
        <a href="/downloads">Download Architecture Brief</a>
        <span>|</span>
        <a href="https://aws.amazon.com/marketplace" target="_blank" rel="noopener">Available on AWS Marketplace</a>
      </div>
    </div>
  </div>
</body>
</html>
