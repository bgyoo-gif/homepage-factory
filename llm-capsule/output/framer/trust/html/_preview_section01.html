<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Section 01 Hero</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&family=Fragment+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background-color: #ffffff; word-break: keep-all; overflow-wrap: break-word; -webkit-font-smoothing: antialiased; }
    img, video { max-width: 100%; display: block; }
    a { text-decoration: none; color: inherit; }

    .s1-section {
      width: 100%;
      overflow: hidden;
      padding-top: 100px;
      padding-bottom: 60px;
      background-color: #ffffff;
    }
    .s1-container {
      width: 100%;
      padding: 0 16px;
      max-width: 100%;
      margin: 0 auto;
    }
    @media (min-width: 768px) { .s1-container { padding: 0 32px; } }
    @media (min-width: 1440px) { .s1-container { padding: 0 120px; max-width: 1440px; } }

    .s1-hero { max-width: 1080px; }
    .s1-title {
      font-size: 32px; font-weight: 700; color: #0f0f0f;
      line-height: 1.2; letter-spacing: -0.5px; margin-bottom: 16px;
      text-wrap: balance;
    }
    @media (min-width: 768px)  { .s1-title { font-size: 40px; } }
    @media (min-width: 1024px) { .s1-title { font-size: 48px; } }
    @media (min-width: 1440px) { .s1-title { font-size: 64px; } }

    .s1-title-highlight { color: #5690D4; }
    .s1-description {
      font-size: 18px; color: #636363; line-height: 1.7;
      max-width: 100%; margin-bottom: 32px;
      word-break: keep-all; overflow-wrap: break-word; text-wrap: pretty;
    }
    @media (min-width: 1024px) { .s1-description { max-width: 720px; } }
    @media (min-width: 1440px) { .s1-description { max-width: 1080px; } }
    .s1-product { font-family: "Oxanium", sans-serif; font-weight: 700; }
    .s1-actions { display: flex; flex-wrap: wrap; gap: 12px; }
    @media (max-width: 767px) { .s1-actions { flex-direction: column; } }
    .s1-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      border-radius: 9999px; font-weight: 500; cursor: pointer; border: none;
      transition: opacity 0.2s, background-color 0.2s; white-space: nowrap;
      text-decoration: none; padding: 12px 32px; font-size: 16px;
    }
    .s1-btn--primary { background: linear-gradient(130deg, #1821E8 0%, #5690D4 50%, #55B45D 100%); color: #ffffff; }
    .s1-btn--primary:hover { opacity: 0.88; }
    .s1-btn--secondary { background-color: transparent; color: #0f0f0f; border: 1px solid #e6e7e9; }
    .s1-btn--secondary:hover { background-color: #f7f7f7; }
  </style>
</head>
<body>
  <section class="s1-section">
    <div class="s1-container">
      <div class="s1-hero">
        <h1 class="s1-title">
          Enterprise-Grade <span class="s1-title-highlight">Security</span> and Compliance
        </h1>
        <p class="s1-description">
          <span class="s1-product">LLM Capsule</span> is built for regulated enterprise environments. Certified, auditable, and designed for data sovereignty. This security foundation is what enables enterprises to adopt AI confidently on their most sensitive data.
        </p>
        <div class="s1-actions">
          <a href="/request-a-demo" class="s1-btn s1-btn--primary">Request a Demo</a>
          <a href="/architecture" class="s1-btn s1-btn--secondary">View Architecture</a>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
