<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Section 01 Hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background: #f2f2f2; padding: 40px 0; }

    .s1-section {
      width: 100%;
      background-color: #ffffff;
      padding: 100px 0 60px;
      overflow: hidden;
    }
    .s1-container {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 16px;
    }
    .s1-title {
      font-family: "DM Sans", sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #0f0f0f;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin: 0 0 16px 0;
      text-wrap: balance;
      word-break: keep-all;
    }
    .s1-description {
      font-family: "DM Sans", sans-serif;
      font-size: 18px;
      color: #636363;
      line-height: 1.7;
      margin: 0;
      word-break: keep-all;
      text-wrap: pretty;
    }
    @media (min-width: 768px) {
      .s1-container { padding: 0 32px; }
      .s1-title { font-size: 36px; }
    }
    @media (min-width: 1024px) {
      .s1-title { font-size: 44px; }
    }
    @media (min-width: 1440px) {
      .s1-container { padding: 0 120px; max-width: 1440px; }
      .s1-title { font-size: 52px; }
    }
  </style>
</head>
<body>
  <section class="s1-section">
    <div class="s1-container">
      <h1 class="s1-title">Secure Enterprise AI Workflows</h1>
      <p class="s1-description">How to build AI data pipeline protection that secures sensitive enterprise data at every stage — from document intake to restored output.</p>
    </div>
  </section>
</body>
</html>
