<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Section 07 CTA Band</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background: #f2f2f2; padding: 0; }

    .s7-cta-band {
      width: 100%;
      position: relative;
      overflow: hidden;
      padding: 80px 16px;
      text-align: center;
      background-color: #171719;
      background-image: url('https://bgyoo-gif.github.io/homepage-factory/cubig/reference/images/bg-gradient-navy-teal.png');
      background-size: cover;
      background-position: center;
    }
    .s7-cta-band::before {
      content: '';
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.15);
      z-index: 0;
    }
    .s7-cta-band > * { position: relative; z-index: 1; }
    .s7-inner-wrap {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .s7-title {
      font-family: "DM Sans", sans-serif;
      font-size: 40px; font-weight: 700; color: #ffffff;
      line-height: 1.2; letter-spacing: -0.5px; margin: 0;
      text-wrap: pretty; word-break: keep-all;
    }
    .s7-product-text {
      font-family: "Oxanium", sans-serif;
      font-weight: 700; color: #ffffff;
    }
    .s7-description {
      font-size: 18px; color: rgba(255,255,255,0.85);
      line-height: 1.7; margin: 0; word-break: keep-all;
    }
    .s7-actions {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 16px;
    }
    .s7-btn {
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 9999px;
      font-family: "DM Sans", sans-serif;
      font-weight: 500; font-size: 18px;
      padding: 16px 48px;
      cursor: pointer; text-decoration: none;
      background-color: rgba(255, 255, 255, 0.92);
      color: #171719;
      border: 1px solid rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(8px);
    }
    .s7-btn:hover { background-color: #ffffff; }
    .s7-footnote {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 24px; margin-top: 8px;
    }
    .s7-footnote a {
      font-size: 14px; color: rgba(255,255,255,0.70);
      text-decoration: none; transition: color 0.2s;
    }
    .s7-footnote a:hover { color: #ffffff; }
    @media (max-width: 767px) {
      .s7-cta-band { background-image: none; }
      .s7-title { font-size: 36px; }
      .s7-actions { flex-direction: column; align-items: center; }
      .s7-btn { width: 100%; max-width: 320px; }
    }
    @media (min-width: 768px) {
      .s7-cta-band { padding: 100px 32px; }
    }
    @media (min-width: 1440px) {
      .s7-cta-band { padding: 120px 120px; }
      .s7-inner-wrap { max-width: 1080px; }
      .s7-title { font-size: 50px; }
    }
  </style>
</head>
<body>
  <section class="s7-cta-band">
    <div class="s7-inner-wrap">
      <h2 class="s7-title">See how <span class="s7-product-text">LLM Capsule</span> works with your data</h2>
      <p class="s7-description">Bring your documents, deployment constraints, and evaluation criteria. We demonstrate on your actual workflows.</p>
      <div class="s7-actions">
        <a href="/request-a-demo" class="s7-btn">Request a Demo</a>
      </div>
      <div class="s7-footnote">
        <a href="https://aws.amazon.com/marketplace" target="_blank" rel="noopener">AWS Marketplace</a>
      </div>
    </div>
  </section>
</body>
</html>
