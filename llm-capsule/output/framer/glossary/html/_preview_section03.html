<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview: Section 03 — CTA Band | Glossary | LLM Capsule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "DM Sans", sans-serif;
      background-color: #f2f2f2;
      -webkit-font-smoothing: antialiased;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .preview-label {
      background-color: #171719;
      color: #9c9c9c;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 20px;
      font-family: "DM Sans", sans-serif;
    }

    .s3-section {
      width: 100%;
      overflow: hidden;
    }

    .s3-cta-band {
      width: 100%;
      position: relative;
      overflow: hidden;
      padding: 80px 16px;
      text-align: center;
      background: linear-gradient(130deg, #1821E8 0%, #5690D4 50%, #55B45D 100%);
    }

    .s3-cta-band::before {
      content: '';
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.15);
      z-index: 0;
    }

    .s3-cta-band > * {
      position: relative;
      z-index: 1;
    }

    .s3-inner {
      max-width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    @media (min-width: 768px) {
      .s3-cta-band { padding: 100px 32px; }
    }
    @media (min-width: 1024px) {
      .s3-inner { max-width: 720px; }
      .s3-cta-band { padding: 100px 32px; }
    }
    @media (min-width: 1440px) {
      .s3-inner { max-width: 1080px; }
      .s3-cta-band { padding: 120px 120px; }
    }

    .s3-title {
      font-size: 36px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin: 0;
      text-wrap: balance;
    }

    @media (min-width: 768px) {
      .s3-title { font-size: 40px; }
    }
    @media (min-width: 1440px) {
      .s3-title { font-size: 50px; }
    }

    .s3-title__product {
      font-family: "Oxanium", sans-serif;
      font-weight: 700;
    }

    .s3-description {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.85);
      line-height: 1.7;
      margin: 0;
      word-break: keep-all;
      overflow-wrap: break-word;
      text-wrap: pretty;
    }

    .s3-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
    }

    .s3-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 9999px;
      font-family: "DM Sans", sans-serif;
      font-weight: 500;
      font-size: 16px;
      padding: 12px 32px;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.6);
      background-color: rgba(255, 255, 255, 0.92);
      color: #0f0f0f;
      text-decoration: none;
      white-space: nowrap;
      backdrop-filter: blur(8px);
      transition: background-color 0.2s;
    }

    .s3-btn:hover {
      background-color: #ffffff;
    }

    .s3-footnote {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin-top: 12px;
    }

    .s3-btn--ghost {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.85);
      padding: 8px 0;
      font-size: 14px;
      backdrop-filter: none;
      transition: color 0.15s;
    }

    .s3-btn--ghost:hover {
      background: none;
      color: #ffffff;
    }

    .s3-btn--secondary {
      background-color: transparent;
      border: 1px solid #e6e7e9;
      color: #0f0f0f;
      font-size: 14px;
      padding: 8px 16px;
      backdrop-filter: none;
    }

    .s3-btn--secondary:hover {
      background-color: #f7f7f7;
    }
  </style>
</head>
<body>
  <div class="preview-label">Glossary / Section 03 — CTA Band</div>

  <section class="s3-section">
    <div class="s3-cta-band" role="region" aria-label="Call to action">
      <div class="s3-inner">
        <h2 class="s3-title">
          See how <span class="s3-title__product">LLM Capsule</span> works with your data
        </h2>
        <p class="s3-description">
          Bring your documents, deployment constraints, and evaluation criteria. We demonstrate on your actual workflows.
        </p>
        <div class="s3-actions">
          <a href="/request-a-demo" class="s3-btn">Request a Demo</a>
        </div>
        <div class="s3-footnote">
          <a href="https://aws.amazon.com/marketplace" target="_blank" rel="noopener" class="s3-btn s3-btn--secondary">Available on AWS Marketplace</a>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
