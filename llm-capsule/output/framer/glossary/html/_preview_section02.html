  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "DM Sans", sans-serif;
      background-color: #f2f2f2;
      -webkit-font-smoothing: antialiased;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .preview-label {
      background-color: #171719;
      color: #9c9c9c;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 20px;
      font-family: "DM Sans", sans-serif;
    }

    .s2-section {
      width: 100%;
      padding: 60px 0;
      background-color: #ffffff;
      overflow: hidden;
    }

    .s2-container {
      width: 100%;
      margin: 0 auto;
      padding: 0 16px;
      box-sizing: border-box;
    }

    @media (min-width: 768px) {
      .s2-container { padding: 0 32px; }
    }
    @media (min-width: 1024px) {
      .s2-container { padding: 0 32px; }
    }
    @media (min-width: 1440px) {
      .s2-container { padding: 0 120px; max-width: 1440px; }
    }

    .s2-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 768px) {
      .s2-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 1024px) {
      .s2-grid { grid-template-columns: repeat(3, 1fr); }
    }

    .s2-card {
      display: flex;
      flex-direction: column;
      background-color: #ffffff;
      border-radius: 18px;
      border: 1px solid #e6e7e9;
      padding: 24px;
      box-shadow: 0px 24px 40px rgba(0, 0, 0, 0.04);
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }

    .s2-card:hover {
      border-color: #5690D4;
      transform: translateY(-2px);
    }

    @media (min-width: 1440px) {
      .s2-card { padding: 32px; }
    }

    .s2-card__icon-wrap {
      margin-bottom: 12px;
      color: #5690D4;
    }

    .s2-card__icon-wrap svg {
      width: 32px;
      height: 32px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .s2-card__title {
      font-size: 18px;
      font-weight: 700;
      color: #0f0f0f;
      line-height: 1.2;
      margin-bottom: 12px;
      text-wrap: balance;
    }

    .s2-card__footer {
      margin-top: auto;
      padding-top: 16px;
    }

    .s2-card__link {
      font-size: 14px;
      font-weight: 500;
      color: #636363;
      transition: color 0.15s;
    }

    .s2-card:hover .s2-card__link {
      color: #0f0f0f;
    }
  </style>
