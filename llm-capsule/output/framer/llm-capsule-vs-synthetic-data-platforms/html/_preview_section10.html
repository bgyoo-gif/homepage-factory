<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview: Section10 CTA</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background: #f2f2f2; }

    .s10-section {
      width: 100%;
      position: relative;
      overflow: hidden;
      padding: 80px 16px;
      text-align: center;
      background-color: #171719;
      background-image: url('https://bgyoo-gif.github.io/homepage-factory/cubig/reference/images/bg-gradient-deep-teal.png');
      background-size: cover;
      background-position: center;
    }
    .s10-section::before { content: ''; position: absolute; inset: 0; background-color: rgba(0,0,0,0.15); z-index: 0; }
    .s10-section > * { position: relative; z-index: 1; }
    .s10-inner { max-width: 100%; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 24px; }
    .s10-title { font-family: "DM Sans", sans-serif; font-size: 36px; font-weight: 700; color: #ffffff; line-height: 1.2; letter-spacing: -0.5px; margin: 0; text-wrap: balance; word-break: keep-all; }
    .s10-brand-name { font-family: "Oxanium", sans-serif; font-weight: 700; }
    .s10-description { font-family: "DM Sans", sans-serif; font-size: 18px; color: rgba(255,255,255,0.85); line-height: 1.7; margin: 0; word-break: keep-all; overflow-wrap: break-word; }
    .s10-actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; }
    .s10-btn { display: inline-flex; align-items: center; justify-content: center; border-radius: 9999px; font-family: "DM Sans", sans-serif; font-weight: 500; font-size: 18px; padding: 16px 48px; cursor: pointer; border: 1px solid rgba(255,255,255,0.6); transition: opacity 0.2s, background-color 0.2s; white-space: nowrap; text-decoration: none; background-color: rgba(255,255,255,0.92); color: #0f0f0f; backdrop-filter: blur(8px); }
    .s10-btn:hover { background-color: #ffffff; }
    .s10-footnote { display: flex; flex-wrap: wrap; justify-content: center; gap: 24px; margin-top: 8px; }
    .s10-footnote a { font-family: "DM Sans", sans-serif; font-size: 14px; color: rgba(255,255,255,0.70); transition: color 0.2s; text-decoration: none; }
    .s10-footnote a:hover { color: #ffffff; }

    @media (min-width: 768px) { .s10-section { padding: 100px 32px; } }
    @media (min-width: 1024px) { .s10-inner { max-width: 720px; } }
    @media (min-width: 1440px) { .s10-section { padding: 120px 120px; } .s10-title { font-size: 50px; } .s10-inner { max-width: 1080px; } }
    @media (max-width: 767px) { .s10-section { background-image: none; } }
  </style>
</head>
<body>
  <section class="s10-section">
    <div class="s10-inner">
      <h2 class="s10-title">See how <span class="s10-brand-name">LLM Capsule</span> works with your data</h2>
      <p class="s10-description">Bring your documents, deployment constraints, and evaluation criteria. We demonstrate on your actual workflows.</p>
      <div class="s10-actions">
        <a href="/request-a-demo" class="s10-btn">Request a Demo</a>
        <a href="/architecture" class="s10-btn">Talk to an Architect</a>
      </div>
      <div class="s10-footnote">
        <a href="/downloads">Download Architecture Brief</a>
        <a href="https://aws.amazon.com/marketplace" target="_blank" rel="noopener">AWS Marketplace</a>
      </div>
    </div>
  </section>
</body>
</html>
