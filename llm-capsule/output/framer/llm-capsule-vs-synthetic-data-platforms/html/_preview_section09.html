<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview: Section09 Related Pages</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background: #f2f2f2; }

    .s9-section { width: 100%; padding: 60px 0; background-color: #ffffff; }
    .s9-container { width: 100%; max-width: 1080px; margin: 0 auto; padding: 0 16px; box-sizing: border-box; }
    .s9-title-icon { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .s9-title-icon__icon { color: #5690D4; flex-shrink: 0; }
    .s9-title-icon__text { font-family: "DM Sans", sans-serif; font-size: 20px; font-weight: 600; color: #0f0f0f; line-height: 1.2; }
    .s9-card-grid { display: grid; grid-template-columns: 1fr; gap: 24px; }
    .s9-card-dark { background-color: #141414; border: 1px solid #303135; color: #ffffff; border-radius: 18px; padding: 24px; box-shadow: 0px 24px 40px rgba(0,0,0,0.04); display: flex; align-items: center; gap: 16px; transition: background-color 0.2s; text-decoration: none; }
    .s9-card-dark:hover { background-color: #171719; }
    .s9-card-dark__icon { flex-shrink: 0; color: #5690D4; }
    .s9-card-dark__title { font-family: "DM Sans", sans-serif; font-size: 16px; font-weight: 600; color: #ffffff; }

    @media (min-width: 768px) { .s9-container { padding: 0 32px; } .s9-card-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1440px) { .s9-container { padding: 0 120px; max-width: 1440px; } }
  </style>
</head>
<body>
  <section class="s9-section">
    <div class="s9-container">
      <div class="s9-title-icon">
        <span class="s9-title-icon__icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
        </span>
        <span class="s9-title-icon__text">Related</span>
      </div>
      <div class="s9-card-grid">
        <a href="/product" class="s9-card-dark">
          <span class="s9-card-dark__icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            </svg>
          </span>
          <span class="s9-card-dark__title">Product Overview</span>
        </a>
        <a href="/architecture" class="s9-card-dark">
          <span class="s9-card-dark__icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </span>
          <span class="s9-card-dark__title">Architecture</span>
        </a>
        <a href="/trust" class="s9-card-dark">
          <span class="s9-card-dark__icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              <path d="m9 12 2 2 4-4"/>
            </svg>
          </span>
          <span class="s9-card-dark__title">Trust &amp; Compliance</span>
        </a>
        <a href="/request-a-demo" class="s9-card-dark">
          <span class="s9-card-dark__icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/>
              <polyline points="12 5 19 12 12 19"/>
            </svg>
          </span>
          <span class="s9-card-dark__title">Request a Demo</span>
        </a>
        <a href="/resources/learn" class="s9-card-dark">
          <span class="s9-card-dark__icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
            </svg>
          </span>
          <span class="s9-card-dark__title">Learn Hub</span>
        </a>
      </div>
    </div>
  </section>
</body>
</html>
