<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview — Section 05 CTA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&family=Fragment+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "DM Sans", sans-serif; background-color: #ffffff; color: #0f0f0f; word-break: keep-all; overflow-wrap: break-word; -webkit-font-smoothing: antialiased; }

.s5-section {
  width: 100%;
  position: relative;
  overflow: hidden;
  padding: 80px 16px;
  text-align: center;
  background-size: cover;
  background-position: center;
  background-image: url('https://bgyoo-gif.github.io/homepage-factory/cubig/reference/images/bg-gradient-deep-teal.png');
  box-sizing: border-box;
}
.s5-section::before {
  content: '';
  position: absolute;
  inset: 0;
  background-color: rgba(0,0,0,0.15);
  z-index: 0;
}
.s5-section > * { position: relative; z-index: 1; }

@media (max-width: 767px) {
  .s5-section { background-image: none; background-color: #1821E8; }
  .s5-section::before { display: none; }
}
@media (min-width: 768px)  { .s5-section { padding: 100px 32px; } }
@media (min-width: 1440px) { .s5-section { padding: 120px 120px; } }

.s5-inner {
  max-width: 720px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}
@media (min-width: 1440px) { .s5-inner { max-width: 1080px; } }

.s5-title {
  font-size: 40px;
  font-weight: 700;
  color: #ffffff;
  line-height: 1.2;
  letter-spacing: -0.5px;
  margin: 0;
}
@media (max-width: 767px) { .s5-title { font-size: 36px; } }
@media (min-width: 1440px) { .s5-title { font-size: 50px; } }

.s5-product-name { font-family: "Oxanium", sans-serif; font-weight: 700; }
.s5-description { font-size: 18px; color: rgba(255,255,255,0.85); line-height: 1.7; margin: 0; word-break: keep-all; }

.s5-actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; }
@media (max-width: 767px) { .s5-actions { flex-direction: column; align-items: center; } }

.s5-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  border-radius: 9999px; font-size: 16px; font-weight: 500; cursor: pointer;
  padding: 12px 32px; text-decoration: none;
  background-color: rgba(255,255,255,0.92); color: #0f0f0f;
  border: 1px solid rgba(255,255,255,0.6);
  backdrop-filter: blur(8px); transition: background-color 0.2s;
  white-space: nowrap;
}
.s5-btn:hover { background-color: #ffffff; }
@media (max-width: 767px) { .s5-btn { width: 100%; max-width: 320px; } }

.s5-footnote { font-size: 12px; color: rgba(255,255,255,0.6); font-family: "Fragment Mono", monospace; letter-spacing: 0.08em; }
.s5-footnote a { color: rgba(255,255,255,0.8); text-decoration: underline; }
.s5-footnote a:hover { color: #ffffff; }
</style>
</head>
<body>
<section class="s5-section" id="section-5">
  <div class="s5-inner">
    <h2 class="s5-title">See how <span class="s5-product-name">LLM Capsule</span> works with your data</h2>
    <p class="s5-description">Bring your documents, deployment constraints, and evaluation criteria. We demonstrate on your actual workflows.</p>
    <div class="s5-actions">
      <a href="/request-a-demo" class="s5-btn">Request a Demo</a>
    </div>
    <div class="s5-footnote">
      &nbsp;&nbsp;|&nbsp;&nbsp;
      <a href="https://aws.amazon.com/marketplace" target="_blank" rel="noopener">Available on AWS Marketplace</a>
    </div>
  </div>
</section>
</body>
</html>
