    .s7-card-dark {

      border: 1px solid #303135;
      color: #ffffff;
      border-radius: 18px;
      padding: 24px;

      display: flex;
      align-items: center;
      gap: 16px;
      transition: background-color 0.2s;
      text-decoration: none;
    }
    .s7-card-dark:hover { background-color: #171719; }
    .s7-card-dark__icon { flex-shrink: 0; color: #5690D4; }
    .s7-card-dark__title {
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
    }
    svg { display: block; }

    @media (min-width: 768px) {
      .s7-container { padding: 0 32px; }
      .s7-card-grid { grid-template-columns: repeat(2, 1fr); }
      .s7-section { padding: 60px 0; }
    }
    @media (min-width: 1440px) {
