<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview: Section 01 — Hero</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background: #f2f2f2; }

    .s1-section {
      width: 100%;
      padding: 100px 0 60px;
      background-color: #ffffff;
    }
    .s1-container {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 16px;
      box-sizing: border-box;
    }
    .s1-title {
      font-size: 28px;
      font-weight: 700;
      color: #0f0f0f;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
      word-break: keep-all;
    }
    .s1-description {
      font-size: 18px;
      color: #636363;
      line-height: 1.7;
      word-break: keep-all;
    }
    .s1-product-name {
      font-family: "Oxanium", sans-serif;
      font-weight: 700;
    }

    @media (min-width: 768px) {
      .s1-container { padding: 0 32px; }
      .s1-title { font-size: 36px; }
    }
    @media (min-width: 1024px) {
      .s1-title { font-size: 44px; }
    }
    @media (min-width: 1440px) {
      .s1-container { padding: 0 120px; max-width: 1440px; }
      .s1-title { font-size: 52px; }
    }
  </style>
</head>
<body>
  <section class="s1-section" id="section-1">
    <div class="s1-container">
      <h1 class="s1-title">Enterprise AI Enablement</h1>
      <p class="s1-description">
        Comprehensive guide to enterprise AI enablement — how
        <span class="s1-product-name">LLM Capsule</span>'s AI enablement data layer uses encapsulation, zero exposure, and local restoration to enable enterprises to adopt AI without data risk.
      </p>
    </div>
  </section>
</body>
</html>
