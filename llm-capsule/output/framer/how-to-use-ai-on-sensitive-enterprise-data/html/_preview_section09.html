<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Section 09: CTA Band</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background: #ffffff; }

    .s9-section {
      width: 100%;
      position: relative;
      overflow: hidden;
      padding: 80px 16px;
      text-align: center;
      background-color: #171719;
      background-image: url('https://bgyoo-gif.github.io/homepage-factory/cubig/reference/images/bg-gradient-violet-teal.png');
      background-size: cover;
      background-position: center;
      box-sizing: border-box;
    }
    .s9-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background-color: rgba(0,0,0,0.15);
      z-index: 0;
    }
    .s9-section > * { position: relative; z-index: 1; }
    .s9-inner {
      max-width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .s9-title {
      font-size: 40px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin: 0;
      word-break: keep-all;
    }
    .s9-brand { font-family: "Oxanium", sans-serif; font-weight: 700; }
    .s9-description {
      font-size: 18px;
      color: rgba(255,255,255,0.85);
      line-height: 1.7;
      margin: 0;
      word-break: keep-all;
    }
    .s9-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
    }
    .s9-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 9999px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.6);
      transition: background-color 0.2s;
      white-space: nowrap;
      text-decoration: none;
      padding: 16px 48px;
      font-size: 18px;
      background-color: rgba(255,255,255,0.92);
      color: #0f0f0f;
      backdrop-filter: blur(8px);
    }
    .s9-btn:hover { background-color: #ffffff; }
    .s9-footnote {
      font-size: 12px;
      color: rgba(255,255,255,0.70);
      margin-top: 8px;
    }

    @media (max-width: 767px) {
      .s9-title { font-size: 36px; }
      .s9-actions { flex-direction: column; align-items: center; }
      .s9-btn { width: 100%; max-width: 320px; }
      .s9-section { background-image: none; }
    }
    @media (min-width: 768px) {
      .s9-section { padding: 100px 32px; }
      .s9-inner { max-width: 720px; }
    }
    @media (min-width: 1440px) {
      .s9-section { padding: 120px 120px; }
      .s9-title { font-size: 50px; }
      .s9-inner { max-width: 1080px; }
    }
  </style>
</head>
<body>
  <section class="s9-section">
    <div class="s9-inner">
      <h2 class="s9-title">Use AI on Your Sensitive Data with <span class="s9-brand">LLM Capsule</span></h2>
      <p class="s9-description">Enable enterprise AI on real documents without exposing sensitive data. Encapsulate locally, process safely, restore completely.</p>
      <div class="s9-actions">
        <a href="request-pov.html" class="s9-btn">Request a Demo</a>
        <a href="product.html" class="s9-btn">View Product</a>
      </div>
      <p class="s9-footnote">Enterprise AI Enablement by CUBIG</p>
    </div>
  </section>
</body>
</html>
