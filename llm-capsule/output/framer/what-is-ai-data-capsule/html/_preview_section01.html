<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Section01_Hero</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&family=Fragment+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background: #ffffff; -webkit-font-smoothing: antialiased; word-break: keep-all; overflow-wrap: break-word; }

    .s1-section {
      width: 100%;
      padding: 100px 0 0;
      background-color: #ffffff;
    }
    .s1-container {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 16px;
      box-sizing: border-box;
    }
    .s1-title {
      font-family: "DM Sans", sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #0f0f0f;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
      text-wrap: pretty;
    }
    .s1-description {
      font-size: 18px;
      color: #636363;
      line-height: 1.7;
      text-wrap: pretty;
    }

    @media (min-width: 768px) {
      .s1-container { padding: 0 32px; }
      .s1-title { font-size: 36px; }
    }
    @media (min-width: 1024px) {
      .s1-title { font-size: 44px; }
    }
    @media (min-width: 1440px) {
      .s1-container { padding: 0 120px; max-width: 1440px; }
      .s1-title { font-size: 52px; }
    }
  </style>
</head>
<body>
  <section class="s1-section">
    <div class="s1-container">
      <h1 class="s1-title">What Is an AI Data Capsule?</h1>
      <p class="s1-description">
        Enterprise data encapsulation for secure LLM usage — how to protect sensitive data before AI processing and restore usable outputs after.
      </p>
    </div>
  </section>
</body>
</html>
