<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Section 08: CTA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&family=Fragment+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f2f2f2; }

    .s8-section {
      width: 100%;
      position: relative;
      overflow: hidden;
      padding: 80px 16px;
      text-align: center;
      background-color: #171719;
      background-image: url('https://bgyoo-gif.github.io/homepage-factory/cubig/reference/images/bg-gradient-navy-teal.png');
      background-size: cover;
      background-position: center;
    }
    .s8-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.15);
      z-index: 0;
    }
    .s8-section > * { position: relative; z-index: 1; }
    .s8-inner {
      max-width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .s8-title {
      font-family: "DM Sans", sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin: 0;
    }
    .s8-product { font-family: "Oxanium", sans-serif; font-weight: 700; }
    .s8-description {
      font-family: "DM Sans", sans-serif;
      font-size: 18px;
      color: rgba(255,255,255,0.85);
      line-height: 1.7;
      margin: 0;
      word-break: keep-all;
      overflow-wrap: break-word;
    }
    .s8-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
    }
    .s8-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 9999px;
      font-family: "DM Sans", sans-serif;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
      padding: 16px 48px;
      font-size: 18px;
      background-color: rgba(255,255,255,0.92);
      color: #0f0f0f;
      border: 1px solid rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      transition: background-color 0.2s;
    }
    .s8-btn:hover { background-color: #ffffff; }
    .s8-footnote {
      font-family: "DM Sans", sans-serif;
      font-size: 12px;
      color: rgba(255,255,255,0.70);
      margin-top: 8px;
    }
    .s8-footnote a { color: inherit; text-decoration: none; }
    .s8-footnote a:hover { text-decoration: underline; }

    @media (min-width: 768px) {
      .s8-section { padding: 100px 32px; }
      .s8-title { font-size: 40px; }
    }
    @media (min-width: 1024px) {
      .s8-inner { max-width: 720px; }
    }
    @media (min-width: 1440px) {
      .s8-section { padding: 120px 120px; }
      .s8-inner { max-width: 1080px; }
      .s8-title { font-size: 50px; }
    }
    @media (max-width: 767px) {
      .s8-section { background-image: none; }
      .s8-title { font-size: 36px; }
      .s8-actions { flex-direction: column; align-items: center; }
      .s8-btn { width: 100%; max-width: 320px; }
    }
  </style>
</head>
<body>
  <section class="s8-section" id="section-cta">
    <div class="s8-inner">
      <h2 class="s8-title">See how <span class="s8-product">LLM Capsule</span> works with your data</h2>
      <p class="s8-description">Bring your documents, deployment constraints, and evaluation criteria. We demonstrate on your actual workflows.</p>
      <div class="s8-actions">
        <a href="/request-a-demo" class="s8-btn">Request a Demo</a>
      </div>
      <p class="s8-footnote">
        &nbsp;&nbsp;·&nbsp;&nbsp;
        <a href="https://aws.amazon.com/marketplace" target="_blank" rel="noopener">AWS Marketplace</a>
      </p>
    </div>
  </section>
</body>
</html>
