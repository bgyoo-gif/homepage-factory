<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Section 01 Hero | Trust Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&family=Fragment+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background: #f2f2f2; }

    .s1-section {
      width: 100%;
      background-color: #ffffff;
      overflow: hidden;
      box-sizing: border-box;
      padding-top: 100px;
      padding-bottom: 100px;
    }
    .s1-container {
      width: 100%;
      padding: 0 16px;
      max-width: 1440px;
      margin: 0 auto;
      box-sizing: border-box;
    }
    @media (min-width: 768px)  { .s1-container { padding: 0 32px; } }
    @media (min-width: 1024px) { .s1-container { padding: 0 32px; } }
    @media (min-width: 1440px) { .s1-container { padding: 0 120px; } }

    .s1-hero { max-width: 1080px; }
    .s1-title {
      font-family: "DM Sans", sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: #0f0f0f;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      text-wrap: pretty;
    }
    @media (min-width: 768px)  { .s1-title { font-size: 40px; } }
    @media (min-width: 1024px) { .s1-title { font-size: 48px; } }
    @media (min-width: 1440px) { .s1-title { font-size: 64px; } }
    .s1-title-highlight { color: #5690D4; }
    .s1-description {
      font-size: 18px;
      color: #636363;
      line-height: 1.7;
      max-width: 100%;
      word-break: keep-all;
      overflow-wrap: break-word;
    }
    @media (min-width: 1024px) { .s1-description { max-width: 720px; } }
    @media (min-width: 1440px) { .s1-description { max-width: 1080px; } }
    .s1-product-name {
      font-family: "Oxanium", sans-serif;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <section class="s1-section" aria-labelledby="s1-hero-title">
    <div class="s1-container">
      <div class="s1-hero">
        <h1 class="s1-title" id="s1-hero-title">
          Security &amp; Compliance <span class="s1-title-highlight">Trust Center</span>
        </h1>
        <p class="s1-description">
          Certifications, compliance documentation, and security information for <span class="s1-product-name">LLM Capsule</span> enterprise AI enablement.
        </p>
      </div>
    </div>
  </section>
</body>
</html>
