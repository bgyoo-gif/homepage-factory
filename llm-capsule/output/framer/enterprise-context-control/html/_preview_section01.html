<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Section 01 Hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f0f0; font-family: "DM Sans", sans-serif; }

    .s1-section {
      width: 100%;
      padding: 100px 0 0;
      background-color: #ffffff;
      overflow: hidden;
    }

    .s1-container {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 16px;
      box-sizing: border-box;
    }

    @media (min-width: 768px)  { .s1-container { padding: 0 32px; } }
    @media (min-width: 1024px) { .s1-container { padding: 0 32px; } }
    @media (min-width: 1440px) { .s1-container { padding: 0 120px; max-width: 1440px; } }

    .s1-title {
      font-family: "DM Sans", sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #0f0f0f;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
      text-wrap: pretty;
    }

    @media (min-width: 768px)  { .s1-title { font-size: 36px; } }
    @media (min-width: 1024px) { .s1-title { font-size: 44px; } }
    @media (min-width: 1440px) { .s1-title { font-size: 52px; } }

    .s1-description {
      font-family: "DM Sans", sans-serif;
      font-size: 18px;
      color: #636363;
      line-height: 1.7;
      max-width: 100%;
      word-break: keep-all;
      overflow-wrap: break-word;
    }
  </style>
</head>
<body>
  <section class="s1-section">
    <div class="s1-container">
      <h1 class="s1-title">Enterprise Context Control</h1>
      <p class="s1-description">Policy-based sensitivity classification that determines what data to protect based on document type, department, and workflow context during AI processing.</p>
    </div>
  </section>
</body>
</html>
