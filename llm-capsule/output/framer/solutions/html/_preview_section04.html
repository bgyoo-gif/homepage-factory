<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Section 04 CTA | Solutions | LLM Capsule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "DM Sans", sans-serif;
      background-color: #f2f2f2;
      -webkit-font-smoothing: antialiased;
    }

    .s4-section {
      width: 100%;
      box-sizing: border-box;
      padding: 0;
    }
    .s4-cta-band {
      width: 100%;
      position: relative;
      overflow: hidden;
      padding: 80px 16px;
      text-align: center;
      background-color: #171719;
      background-image: url('https://bgyoo-gif.github.io/homepage-factory/cubig/reference/images/bg-wave-teal-blue.webp');
      background-size: cover;
      background-position: center;
    }
    .s4-cta-band::before {
      content: '';
      position: absolute;
      inset: 0;
      background-color: rgba(0,0,0,0.15);
      z-index: 0;
    }
    .s4-cta-band > * { position: relative; z-index: 1; }
    .s4-cta-inner {
      max-width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .s4-cta-title {
      font-family: "DM Sans", sans-serif;
      font-size: 36px; font-weight: 700;
      color: #ffffff; line-height: 1.2;
      letter-spacing: -0.5px; margin: 0;
    }
    .s4-title-product { font-family: "Oxanium", sans-serif; font-weight: 700; }
    .s4-cta-desc {
      font-size: 18px; color: rgba(255,255,255,0.85);
      line-height: 1.7; margin: 0;
      word-break: keep-all; overflow-wrap: break-word;
    }
    .s4-cta-actions {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 16px;
    }
    .s4-btn {
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 9999px; font-family: "DM Sans", sans-serif; font-weight: 500;
      cursor: pointer; border: none; transition: opacity 0.2s;
      white-space: nowrap; text-decoration: none;
    }
    .s4-btn--md {
      padding: 12px 32px; font-size: 16px;
      background-color: rgba(255,255,255,0.92);
      color: #0f0f0f;
      border: 1px solid rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
    }
    .s4-btn--sm {
      padding: 8px 16px; font-size: 14px;
      background-color: transparent;
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.4);
    }
    .s4-cta-footnote {
      display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
    }

    @media (max-width: 767px) {
      .s4-cta-band { background-image: none; }
      .s4-cta-title { font-size: 36px; }
      .s4-cta-actions { flex-direction: column; align-items: center; }
      .s4-btn--md { width: 100%; max-width: 320px; }
    }
    @media (min-width: 768px) {
      .s4-cta-band { padding: 100px 32px; }
      .s4-cta-title { font-size: 40px; }
    }
    @media (min-width: 1024px) {
      .s4-cta-inner { max-width: 720px; }
    }
    @media (min-width: 1440px) {
      .s4-cta-band { padding: 120px 120px; }
      .s4-cta-inner { max-width: 860px; }
      .s4-cta-title { font-size: 50px; }
    }
  </style>
</head>
<body>
  <section class="s4-section">
    <div class="s4-cta-band">
      <div class="s4-cta-inner">
        <h2 class="s4-cta-title">
          See how your industry uses <span class="s4-title-product">LLM Capsule</span>
        </h2>
        <p class="s4-cta-desc">
          Bring your documents, deployment constraints, and evaluation questions.
          We will show how LLM Capsule fits your environment.
        </p>
        <div class="s4-cta-actions">
          <a href="request-pov.html" class="s4-btn s4-btn--md">Request a Demo</a>
          <a href="product.html" class="s4-btn s4-btn--md">See Product</a>
          <a href="architecture.html" class="s4-btn s4-btn--md">View Architecture</a>
        </div>
        <div class="s4-cta-footnote">
          <a href="downloads.html" class="s4-btn s4-btn--sm">Download Architecture Brief</a>
          <a href="https://aws.amazon.com/marketplace" target="_blank" rel="noopener" class="s4-btn s4-btn--sm">Available on AWS Marketplace</a>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
