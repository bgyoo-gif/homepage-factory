<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Section 01 Hero | Pricing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "DM Sans", sans-serif;
      background-color: #f2f2f2;
      word-break: keep-all;
      overflow-wrap: break-word;
      -webkit-font-smoothing: antialiased;
    }

    .s1-section {
      width: 100%;
      padding: 100px 0 0;
      background-color: #ffffff;
      overflow: hidden;
    }
    .s1-container {
      width: 100%;
      margin: 0 auto;
      padding: 0 16px;
      box-sizing: border-box;
    }
    .s1-hero {
      text-align: center;
      padding-bottom: 60px;
    }
    .s1-hero__title {
      font-family: "DM Sans", sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: #0f0f0f;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      text-wrap: pretty;
    }
    .s1-hero__title-brand {
      color: #5690D4;
    }
    .s1-hero__description {
      font-family: "DM Sans", sans-serif;
      font-size: 18px;
      color: #636363;
      line-height: 1.7;
      max-width: 100%;
      margin: 0 auto;
      word-break: keep-all;
      overflow-wrap: break-word;
      text-wrap: pretty;
    }
    .s1-hero__description-product {
      font-family: "Oxanium", sans-serif;
      font-weight: 700;
    }

    @media (min-width: 768px) {
      .s1-container { padding: 0 32px; }
      .s1-hero__title { font-size: 40px; }
    }
    @media (min-width: 1024px) {
      .s1-hero__title { font-size: 48px; }
      .s1-hero__description { max-width: 720px; }
    }
    @media (min-width: 1440px) {
      .s1-container { padding: 0 120px; max-width: 1440px; }
      .s1-hero__title { font-size: 64px; }
      .s1-hero__description { max-width: 1080px; }
    }
  </style>
</head>
<body>
  <section class="s1-section" aria-label="Hero">
    <div class="s1-container">
      <div class="s1-hero">
        <h1 class="s1-hero__title">
          Enterprise <span class="s1-hero__title-brand">Pricing</span>
        </h1>
        <p class="s1-hero__description">
          <span class="s1-hero__description-product">LLM Capsule</span>
          is priced for enterprise deployment. Contact us for volume-based pricing tailored to your document processing workload and deployment requirements.
        </p>
      </div>
    </div>
  </section>
</body>
</html>
