<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Section 01 Hero</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background: #ffffff; -webkit-font-smoothing: antialiased; }

    .s1-section {
      width: 100%;
      padding: 100px 0 0;
      background-color: #ffffff;
      overflow: hidden;
    }
    .s1-container {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 16px;
    }
    .s1-breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .s1-breadcrumb__link {
      font-size: 14px;
      color: #5690D4;
      font-weight: 500;
      text-decoration: none;
    }
    .s1-breadcrumb__link:hover { color: #1821E8; }
    .s1-breadcrumb__sep { font-size: 14px; color: #9c9c9c; }
    .s1-breadcrumb__current { font-size: 14px; color: #9c9c9c; }
    .s1-title {
      font-size: 28px;
      font-weight: 700;
      color: #0f0f0f;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
      text-wrap: balance;
      word-break: keep-all;
    }
    .s1-description {
      font-size: 18px;
      color: #636363;
      line-height: 1.7;
      max-width: 100%;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    @media (min-width: 768px) {
      .s1-container { padding: 0 32px; }
      .s1-title { font-size: 36px; }
    }
    @media (min-width: 1024px) {
      .s1-title { font-size: 44px; }
    }
    @media (min-width: 1440px) {
      .s1-container { padding: 0 120px; max-width: 1440px; }
      .s1-title { font-size: 52px; }
    }
  </style>
</head>
<body>
  <section class="s1-section">
    <div class="s1-container">
      <nav class="s1-breadcrumb" aria-label="Breadcrumb">
        <a href="/" class="s1-breadcrumb__link">Home</a>
        <span class="s1-breadcrumb__sep">/</span>
        <a href="/resources" class="s1-breadcrumb__link">Resources</a>
        <span class="s1-breadcrumb__sep">/</span>
        <a href="/resources/learn" class="s1-breadcrumb__link">Learn</a>
        <span class="s1-breadcrumb__sep">/</span>
        <span class="s1-breadcrumb__current">Why Redaction Breaks Enterprise AI Workflows</span>
      </nav>
      <h1 class="s1-title">Why Redaction Breaks Enterprise AI Workflows</h1>
      <p class="s1-description">Masking and redaction tools destroy the data context that AI models need. Enterprise AI requires structure-preserving processing with restorable outputs.</p>
    </div>
  </section>
</body>
</html>
