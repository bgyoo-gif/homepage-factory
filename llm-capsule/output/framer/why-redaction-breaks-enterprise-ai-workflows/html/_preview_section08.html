    .s8-card {

      border: 1px solid #303135;
      color: #ffffff;
      border-radius: 18px;
      padding: 24px;

      align-items: center;
      gap: 16px;
      text-decoration: none;
      transition: background-color 0.2s;
    }
    .s8-card:hover { background-color: #171719; }
    .s8-card__icon { flex-shrink: 0; color: #5690D4; }
    .s8-card__title { font-size: 16px; font-weight: 600; color: #ffffff; }
    .s8-product { font-family: "Oxanium", sans-serif; font-weight: 700; }
