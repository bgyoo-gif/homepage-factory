<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Section 09 CTA Band</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background: #ffffff; -webkit-font-smoothing: antialiased; }

    .s9-section {
      width: 100%;
      position: relative;
      overflow: hidden;
      padding: 80px 16px;
      text-align: center;
      background-color: #171719;
      background-image: url('https://bgyoo-gif.github.io/homepage-factory/cubig/reference/images/bg-gradient-navy-teal.png');
      background-size: cover;
      background-position: center;
    }
    .s9-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background-color: rgba(0,0,0,0.15);
      z-index: 0;
    }
    .s9-band-inner {
      position: relative;
      z-index: 1;
      max-width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .s9-title {
      font-size: 36px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin: 0;
      text-wrap: pretty;
      word-break: keep-all;
    }
    .s9-product { font-family: "Oxanium", sans-serif; font-weight: 700; }
    .s9-description { font-size: 18px; color: rgba(255,255,255,0.85); line-height: 1.7; margin: 0; word-break: keep-all; }
    .s9-actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; flex-direction: column; align-items: center; }
    .s9-btn {
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 9999px; font-weight: 500; cursor: pointer; text-decoration: none;
      padding: 16px 48px; font-size: 18px;
      background-color: rgba(255,255,255,0.92); color: #0f0f0f;
      border: 1px solid rgba(255,255,255,0.6); backdrop-filter: blur(8px);
      width: 100%; max-width: 320px; transition: background-color 0.2s;
    }
    .s9-btn:hover { background-color: #ffffff; }
    .s9-footnote { display: flex; flex-wrap: wrap; justify-content: center; gap: 24px; margin-top: 8px; }
    .s9-footnote a { font-size: 14px; color: rgba(255,255,255,0.70); text-decoration: none; transition: color 0.2s; }
    .s9-footnote a:hover { color: #ffffff; }

    @media (min-width: 768px) {
      .s9-section { padding: 100px 32px; }
      .s9-title { font-size: 40px; }
      .s9-actions { flex-direction: row; }
      .s9-btn { width: auto; max-width: none; }
    }
    @media (min-width: 1024px) { .s9-band-inner { max-width: 720px; } }
    @media (min-width: 1440px) { .s9-section { padding: 120px 120px; } .s9-band-inner { max-width: 1080px; } .s9-title { font-size: 50px; } }
    @media (max-width: 767px) { .s9-section { background-image: none; } }
  </style>
</head>
<body>
  <section class="s9-section">
    <div class="s9-band-inner">
      <h2 class="s9-title">See how <span class="s9-product">LLM Capsule</span> works with your data</h2>
      <p class="s9-description">Bring your documents, deployment constraints, and evaluation criteria. We demonstrate on your actual workflows.</p>
      <div class="s9-actions">
        <a href="/request-a-demo" class="s9-btn">Request a Demo</a>
      </div>
      <div class="s9-footnote">
        <a href="https://aws.amazon.com/marketplace" target="_blank" rel="noopener">AWS Marketplace</a>
      </div>
    </div>
  </section>
</body>
</html>
