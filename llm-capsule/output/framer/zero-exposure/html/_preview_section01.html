<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Section01 Hero | Zero Exposure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&family=Fragment+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f0f0; font-family: "DM Sans", sans-serif; }

    .s1-section {
      width: 100%;
      padding: 100px 0 40px;
      background-color: #ffffff;
      overflow: hidden;
    }
    .s1-inner {
      width: 100%;
    }
    .s1-container {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 16px;
      box-sizing: border-box;
    }
    .s1-title {
      font-family: "DM Sans", sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #0f0f0f;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
      word-break: keep-all;
      overflow-wrap: break-word;
      text-wrap: balance;
    }
    .s1-description {
      font-family: "DM Sans", sans-serif;
      font-size: 18px;
      color: #636363;
      line-height: 1.7;
      word-break: keep-all;
      overflow-wrap: break-word;
      text-wrap: pretty;
    }
    .s1-product-name {
      font-family: "Oxanium", sans-serif;
      font-weight: 700;
    }

    @media (min-width: 768px) {
      .s1-container { padding: 0 32px; }
      .s1-title { font-size: 36px; }
    }
    @media (min-width: 1024px) {
      .s1-container { padding: 0 32px; }
      .s1-title { font-size: 44px; }
    }
    @media (min-width: 1440px) {
      .s1-container { padding: 0; max-width: 1080px; }
      .s1-title { font-size: 52px; }
    }
  </style>
</head>
<body>
  <section class="s1-section">
    <div class="s1-inner">
      <div class="s1-container">
        <h1 class="s1-title">Zero Exposure</h1>
        <p class="s1-description">
          Zero exposure means original sensitive enterprise data never leaves the enterprise environment during AI processing. Only encapsulated representations cross the trust boundary to external AI services. A core principle of
          <span class="s1-product-name">LLM Capsule</span>.
        </p>
      </div>
    </div>
  </section>
</body>
</html>
