<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Section 07 KPI Band</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background: #ffffff; -webkit-font-smoothing: antialiased; }

    .s7-section { width: 100%; padding: 60px 0; background-color: #ffffff; overflow: hidden; }
    .s7-container { width: 100%; padding: 0 16px; margin: 0 auto; box-sizing: border-box; }
    @media (min-width: 768px)  { .s7-container { padding: 0 32px; } }
    @media (min-width: 1024px) { .s7-container { padding: 0 32px; } }
    @media (min-width: 1440px) { .s7-container { padding: 0 120px; max-width: 1440px; } }

    .s7-kpi-band { border-radius: 40px; padding: 48px 40px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px; justify-items: center; background-color: #171719; background-image: url('https://bgyoo-gif.github.io/homepage-factory/cubig/reference/images/bg-gradient-navy-teal.png'); background-size: cover; background-position: center; position: relative; overflow: hidden; }
    .s7-kpi-band::before { content: ''; position: absolute; inset: 0; background-color: rgba(0,0,0,0.35); z-index: 0; }
    .s7-kpi-band > * { position: relative; z-index: 1; }
    @media (max-width: 1023px) { .s7-kpi-band { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 767px) { .s7-kpi-band { grid-template-columns: 1fr; padding: 32px 20px; background-image: none; } }

    .s7-kpi-item { display: flex; flex-direction: column; gap: 12px; text-align: center; }
    .s7-kpi-number { font-size: 50px; font-weight: 700; line-height: 1; color: #ffffff; }
    .s7-kpi-label { font-size: 14px; color: rgba(255,255,255,0.85); line-height: 1.5; }
  </style>
</head>
<body>
  <section class="s7-section" id="section-kpi">
    <div class="s7-container">
      <div class="s7-kpi-band">
        <div class="s7-kpi-item">
          <span class="s7-kpi-number">3+2</span>
          <span class="s7-kpi-label">Core Architecture</span>
        </div>
        <div class="s7-kpi-item">
          <span class="s7-kpi-number">Zero</span>
          <span class="s7-kpi-label">Raw Data Exposure</span>
        </div>
        <div class="s7-kpi-item">
          <span class="s7-kpi-number">100%</span>
          <span class="s7-kpi-label">Local Restoration</span>
        </div>
        <div class="s7-kpi-item">
          <span class="s7-kpi-number">Any</span>
          <span class="s7-kpi-label">LLM Model Support</span>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
