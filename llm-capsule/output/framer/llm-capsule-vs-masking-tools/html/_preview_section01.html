<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview: Section01_Hero</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background: #ffffff; }

    .s1-section {
      width: 100%;
      overflow: hidden;
      padding: 100px 0 48px;
      background-color: #ffffff;
    }
    .s1-container {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 16px;
    }
    .s1-title {
      font-family: "DM Sans", sans-serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.5px;
      color: #0f0f0f;
      margin: 0 0 16px 0;
    }
    .s1-product {
      font-family: "Oxanium", sans-serif;
      font-weight: 700;
    }
    .s1-description {
      font-size: 18px;
      color: #636363;
      line-height: 1.7;
      margin: 0;
    }
    @media (min-width: 768px) {
      .s1-container { padding: 0 32px; }
      .s1-title { font-size: 36px; }
    }
    @media (min-width: 1024px) {
      .s1-title { font-size: 44px; }
    }
    @media (min-width: 1440px) {
      .s1-container { padding: 0; }
      .s1-title { font-size: 52px; }
    }
  </style>
</head>
<body>
  <section class="s1-section">
    <div class="s1-container">
      <h1 class="s1-title"><span class="s1-product">LLM Capsule</span> vs Masking Tools</h1>
      <p class="s1-description">
        How <span class="s1-product">LLM Capsule</span>'s structure-preserving encapsulation compares to traditional masking and redaction tools for enterprise AI workflows.
      </p>
    </div>
  </section>
</body>
</html>
