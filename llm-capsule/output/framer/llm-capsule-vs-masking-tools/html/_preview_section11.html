<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview: Section11_CTABand</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background: #0f0f0f; }

    .s11-section {
      width: 100%;
      position: relative;
      overflow: hidden;
      padding: 80px 16px;
      text-align: center;
      background-color: #171719;
      background-image: url('https://bgyoo-gif.github.io/homepage-factory/cubig/reference/images/bg-paint-blue-iridescent.png');
      background-size: cover;
      background-position: center;
    }
    .s11-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.15);
      z-index: 0;
    }
    .s11-inner { position: relative; z-index: 1; }
    .s11-container { max-width: 100%; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 24px; }
    .s11-title { font-family: "DM Sans", sans-serif; font-size: 36px; font-weight: 700; color: #ffffff; line-height: 1.2; letter-spacing: -0.5px; margin: 0; }
    .s11-product { font-family: "Oxanium", sans-serif; font-weight: 700; }
    .s11-description { font-size: 18px; color: rgba(255,255,255,0.85); line-height: 1.7; margin: 0; word-break: keep-all; overflow-wrap: break-word; }
    .s11-actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; flex-direction: column; align-items: center; }
    .s11-btn {
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 9999px;
      font-family: "DM Sans", sans-serif; font-weight: 500;
      border: 1px solid rgba(255,255,255,0.6);
      padding: 16px 48px; font-size: 18px;
      background-color: rgba(255,255,255,0.92);
      color: #0f0f0f;
      backdrop-filter: blur(8px);
      text-decoration: none;
      width: 100%; max-width: 320px;
      transition: background-color 0.2s;
    }
    .s11-btn:hover { background-color: #ffffff; }
    .s11-footnote { display: flex; flex-wrap: wrap; justify-content: center; gap: 24px; margin-top: 8px; }
    .s11-footnote a { font-size: 14px; color: rgba(255,255,255,0.7); text-decoration: none; transition: color 0.2s; }
    .s11-footnote a:hover { color: #ffffff; }
    @media (min-width: 768px) {
      .s11-section { padding: 100px 32px; }
      .s11-title { font-size: 40px; }
      .s11-actions { flex-direction: row; }
      .s11-btn { width: auto; max-width: none; }
    }
    @media (min-width: 1024px) { .s11-container { max-width: 720px; } }
    @media (min-width: 1440px) {
      .s11-section { padding: 120px; }
      .s11-container { max-width: 1080px; }
      .s11-title { font-size: 50px; }
    }
    @media (max-width: 767px) {
      .s11-section { background-image: none; }
    }
  </style>
</head>
<body>
  <section class="s11-section">
    <div class="s11-inner">
      <div class="s11-container">
        <h2 class="s11-title">See how <span class="s11-product">LLM Capsule</span> works with your data</h2>
        <p class="s11-description">Bring your documents, deployment constraints, and evaluation criteria. We demonstrate on your actual workflows.</p>
        <div class="s11-actions">
          <a href="request-pov.html" class="s11-btn">Request a Demo</a>
          <a href="architecture.html" class="s11-btn">Talk to an Architect</a>
        </div>
        <div class="s11-footnote">
          <a href="downloads.html">Download Architecture Brief</a>
          <a href="https://aws.amazon.com/marketplace" target="_blank" rel="noopener">AWS Marketplace</a>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
