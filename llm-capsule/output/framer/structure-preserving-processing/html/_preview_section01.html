<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Section 01 Hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&family=Fragment+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background-color: #f2f2f2; }

    .s1-section {
      width: 100%;
      padding: 100px 0 0;
      background-color: #ffffff;
      overflow: hidden;
    }

    .s1-container {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 16px;
      box-sizing: border-box;
    }

    .s1-title {
      font-family: "DM Sans", sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #0f0f0f;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
      text-wrap: pretty;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .s1-description {
      font-family: "DM Sans", sans-serif;
      font-size: 18px;
      color: #636363;
      line-height: 1.7;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .s1-product-name {
      font-family: "Oxanium", sans-serif;
      font-weight: 700;
    }

    @media (min-width: 768px) {
      .s1-container { padding: 0 32px; }
      .s1-title { font-size: 36px; }
    }

    @media (min-width: 1024px) {
      .s1-title { font-size: 44px; }
    }

    @media (min-width: 1440px) {
      .s1-container { padding: 0 120px; max-width: 1440px; }
      .s1-title { font-size: 52px; }
    }
  </style>
</head>
<body>
  <section class="s1-section">
    <div class="s1-container">
      <h1 class="s1-title">Structure-Preserving Processing</h1>
      <p class="s1-description">
        Replacing sensitive elements while maintaining document layout, entity relationships, and semantic context for accurate AI processing — a core capability of
        <span class="s1-product-name">LLM Capsule</span>.
      </p>
    </div>
  </section>
</body>
</html>
