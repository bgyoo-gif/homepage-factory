<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Section 05 Related Terms</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&family=Fragment+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background-color: #f2f2f2; }

    .s5-section {
      width: 100%;
      padding: 32px 0;
      background-color: #ffffff;
      overflow: hidden;
    }

    .s5-container {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 16px;
      box-sizing: border-box;
    }

    .s5-section-header {
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e6e7e9;
      text-align: center;
    }

    .s5-section-header h2 {
      font-family: "DM Sans", sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #0f0f0f;
      line-height: 1.2;
      letter-spacing: -0.5px;
    }

    .s5-text--brand {
      color: #5690D4;
    }

    .s5-related-terms {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 32px;
    }

    .s5-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 9999px;
      font-family: "DM Sans", sans-serif;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid #e6e7e9;
      transition: opacity 0.2s, background-color 0.2s;
      white-space: nowrap;
      text-decoration: none;
      padding: 8px 16px;
      font-size: 14px;
      background-color: transparent;
      color: #0f0f0f;
    }

    .s5-btn:hover {
      background-color: #f7f7f7;
    }

    .s5-section-title-icon {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .s5-section-title-icon__icon {
      color: #5690D4;
      flex-shrink: 0;
      width: 24px;
      height: 24px;
    }

    .s5-section-title-icon__text {
      font-family: "DM Sans", sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: #0f0f0f;
      line-height: 1.2;
    }

    .s5-card-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .s5-card--dark {
      background-color: #141414;
      border: 1px solid #303135;
      color: #ffffff;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0px 24px 40px rgba(0, 0, 0, 0.04);
      display: flex;
      align-items: center;
      gap: 16px;
      transition: background-color 0.2s;
      text-decoration: none;
    }

    .s5-card--dark:hover {
      background-color: #171719;
    }

    .s5-card--dark__icon {
      flex-shrink: 0;
      color: #5690D4;
      width: 24px;
      height: 24px;
    }

    .s5-card--dark__title {
      font-family: "DM Sans", sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
    }

    @media (min-width: 768px) {
      .s5-container { padding: 0 32px; }
      .s5-card-grid { grid-template-columns: repeat(2, 1fr); }
      .s5-section-header h2 { font-size: 22px; }
    }

    @media (min-width: 1024px) {
      .s5-section-header h2 { font-size: 24px; }
    }

    @media (min-width: 1440px) {
      .s5-container { padding: 0 120px; max-width: 1440px; }
      .s5-section-header h2 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <section class="s5-section">
    <div class="s5-container">
      <div class="s5-section-header">
        <h2>Related <span class="s5-text--brand">Terms</span></h2>
      </div>

      <div class="s5-related-terms">
        <a href="/resources/glossary/restoration" class="s5-btn">Restoration</a>
        <a href="/resources/glossary/enterprise-context-control" class="s5-btn">Enterprise Context Control</a>
        <a href="/resources/glossary/zero-exposure" class="s5-btn">Zero Exposure</a>
      </div>

      <div class="s5-section-title-icon">
        <span class="s5-section-title-icon__icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="24" height="24">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
        </span>
        <span class="s5-section-title-icon__text">Related Pages</span>
      </div>

      <div class="s5-card-grid">
        <a href="/product" class="s5-card--dark">
          <span class="s5-card--dark__icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="24" height="24">
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            </svg>
          </span>
          <span class="s5-card--dark__title">Product Overview</span>
        </a>
        <a href="/architecture" class="s5-card--dark">
          <span class="s5-card--dark__icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="24" height="24">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </span>
          <span class="s5-card--dark__title">Architecture</span>
        </a>
        <a href="/trust" class="s5-card--dark">
          <span class="s5-card--dark__icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="24" height="24">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              <path d="m9 12 2 2 4-4"/>
            </svg>
          </span>
          <span class="s5-card--dark__title">Trust &amp; Compliance</span>
        </a>
        <a href="/request-a-demo" class="s5-card--dark">
          <span class="s5-card--dark__icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="24" height="24">
              <line x1="5" y1="12" x2="19" y2="12"/>
              <polyline points="12 5 19 12 12 19"/>
            </svg>
          </span>
          <span class="s5-card--dark__title">Request a Demo</span>
        </a>
      </div>
    </div>
  </section>
</body>
</html>
