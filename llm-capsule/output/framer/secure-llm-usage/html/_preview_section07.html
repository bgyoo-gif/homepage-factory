<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview: Section07 CTA — Secure LLM Usage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background: #f2f2f2; }

    .s7-section {
      width: 100%;
      position: relative;
      overflow: hidden;
      padding: 80px 16px;
      text-align: center;
      background-color: #171719;
      background-image: url('https://bgyoo-gif.github.io/homepage-factory/cubig/reference/images/bg-gradient-blue-violet.webp');
      background-size: cover;
      background-position: center;
    }
    .s7-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background-color: rgba(0,0,0,0.15);
      z-index: 0;
    }
    .s7-inner {
      position: relative;
      z-index: 1;
      max-width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .s7-title {
      font-size: 36px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin: 0;
    }
    .s7-product-name {
      font-family: "Oxanium", sans-serif;
      font-weight: 700;
    }
    .s7-description {
      font-size: 18px;
      color: rgba(255,255,255,0.85);
      line-height: 1.7;
      margin: 0;
      word-break: keep-all;
    }
    .s7-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
    }
    .s7-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 48px;
      font-size: 18px;
      font-weight: 500;
      background-color: rgba(255,255,255,0.92);
      color: #0f0f0f;
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 9999px;
      text-decoration: none;
      white-space: nowrap;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background-color 0.2s;
    }
    .s7-btn:hover { background-color: #ffffff; }
    .s7-footnote {
      font-size: 12px;
      color: rgba(255,255,255,0.70);
      margin-top: 8px;
    }

    @media (min-width: 768px) {
      .s7-section { padding: 100px 32px; }
      .s7-inner { max-width: 720px; }
    }
    @media (min-width: 1440px) {
      .s7-section { padding: 120px 120px; }
      .s7-inner { max-width: 1080px; }
      .s7-title { font-size: 50px; }
    }
    @media (max-width: 767px) {
      .s7-title { font-size: 36px; }
      .s7-actions { flex-direction: column; align-items: center; }
      .s7-btn { width: 100%; max-width: 320px; }
      .s7-section { background-image: none; }
    }
  </style>
</head>
<body>
  <section class="s7-section">
    <div class="s7-inner">
      <h2 class="s7-title">Enable <span class="s7-product-name">Secure LLM Usage</span> for Your Enterprise</h2>
      <p class="s7-description">Process sensitive data through any LLM without exposure. Experience the AI enablement data layer.</p>
      <div class="s7-actions">
        <a href="request-pov.html" class="s7-btn">Request a Demo</a>
        <a href="product.html" class="s7-btn">View Product</a>
      </div>
      <p class="s7-footnote">Enterprise AI Enablement by CUBIG</p>
    </div>
  </section>
</body>
</html>
