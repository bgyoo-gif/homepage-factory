<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview: Section01 Hero — Secure LLM Usage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Oxanium:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background: #f2f2f2; }

    .s1-section {
      width: 100%;
      padding: 100px 0 0;
      background-color: #ffffff;
      overflow: hidden;
    }
    .s1-container {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 16px;
    }
    .s1-title {
      font-family: "DM Sans", sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #0f0f0f;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin: 0 0 16px 0;
    }
    .s1-title-brand { color: #5690D4; }
    .s1-description {
      font-family: "DM Sans", sans-serif;
      font-size: 18px;
      color: #636363;
      line-height: 1.7;
      margin: 0;
      word-break: keep-all;
      overflow-wrap: break-word;
    }
    .s1-product-name {
      font-family: "Oxanium", sans-serif;
      font-weight: 700;
    }

    @media (min-width: 768px) {
      .s1-container { padding: 0 32px; }
      .s1-title { font-size: 36px; }
    }
    @media (min-width: 1024px) {
      .s1-title { font-size: 44px; }
    }
    @media (min-width: 1440px) {
      .s1-container { padding: 0; }
      .s1-title { font-size: 52px; }
    }
  </style>
</head>
<body>
  <section class="s1-section">
    <div class="s1-container">
      <h1 class="s1-title">
        <span class="s1-title-brand">Secure</span> LLM Usage
      </h1>
      <p class="s1-description">
        Using large language models for enterprise tasks without exposing original sensitive data to external AI services. Enabled by <span class="s1-product-name">LLM Capsule</span>.
      </p>
    </div>
  </section>
</body>
</html>
