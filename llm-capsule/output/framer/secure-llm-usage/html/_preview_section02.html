<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview: Section02 Screenshot — Secure LLM Usage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background: #f2f2f2; }

    .s2-section {
      width: 100%;
      padding: 32px 0;
      background-color: #ffffff;
    }
    .s2-container {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 16px;
    }
    .s2-frame {
      border-radius: 40px 40px 0 0;
      padding: 32px 32px 0;
      background-color: #f2f2f2;
      background-image: url('https://bgyoo-gif.github.io/homepage-factory/cubig/reference/images/bg-paint-blue-iridescent.webp');
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }
    .s2-screenshot {
      background-color: #ffffff;
      border-radius: 8px 8px 0 0;
      overflow: hidden;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }
    .s2-label {
      font-size: 14px;
      color: #9c9c9c;
      text-align: center;
      line-height: 1.7;
      word-break: keep-all;
    }

    @media (min-width: 768px) { .s2-container { padding: 0 32px; } }
    @media (max-width: 767px) {
      .s2-frame { border-radius: 24px 24px 0 0; background-image: none; }
    }
  </style>
</head>
<body>
  <section class="s2-section">
    <div class="s2-container">
      <div class="s2-frame">
        <div class="s2-screenshot">
          <p class="s2-label">
            Secure LLM Usage — Sensitive enterprise data encapsulated before reaching any LLM, results restored locally
          </p>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
